<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDEL'PARC 26 — Quel est votre char préféré ?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-logo">EDEL<span class="star">★</span>PARC<sup>26</sup></div>
            <h1>Quel est votre char préféré ?</h1>
        </header>

        <!-- Messages -->
        <div id="success-message" class="message success" style="display: none;"></div>
        <div id="error-message" class="message error" style="display: none;"></div>

        <!-- Loading -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Chargement...</p>
        </div>

        <!-- Characters Grid -->
        <div id="parade-grid" class="parade-grid" style="display: none;"></div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="site-info">
            Pour plus d'informations sur EDEL'PARC 26, rendez-vous sur notre site : <a href="https://edelparc26.ch">edelparc26.ch</a>
        </div>
    </footer>
    <script src="app.js"></script>
</body>
</html>
